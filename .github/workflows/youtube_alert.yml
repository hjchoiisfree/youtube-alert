name: YouTube 이선엽 알림

on:
  workflow_dispatch:

# 외부 cron(예: cron-job.org)이 workflow_dispatch를 호출하는 구조.
# 실행이 겹치면 git push 충돌이 날 수 있어 동시 실행을 막는다.
concurrency:
  group: youtube-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests youtube-transcript-api
      - name: 알림 실행
        env:
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: python checker.py
      - name: 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          touch seen_ids.txt
          git add seen_ids.txt archive/
          git add 관점_종합.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update seen_ids, archive, 관점_종합"
          git pull --rebase origin main
          git push
