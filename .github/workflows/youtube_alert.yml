name: YouTube 이선엽 알림

on:
  schedule:
    # UTC 09:12 = KST 18:12 (오후 6시 12분)
    # 정각(분=0)은 전 세계 워크플로우가 몰려 지연이 심하므로 어중간한 분 사용
    - cron: "12 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests youtube-transcript-api
      - name: 알림 실행
        env:
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: python checker.py
      - name: 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          touch seen_ids.txt
          git add seen_ids.txt archive/
          git add 관점_종합.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update seen_ids, archive, 관점_종합"
          git pull --rebase origin main
          git push
